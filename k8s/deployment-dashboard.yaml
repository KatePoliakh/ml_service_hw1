apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-dashboard
  template:
    metadata:
      labels:
        app: ml-dashboard
    spec:
      containers:
      - name: dashboard
        image: ml-service-dashboard:latest
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 8501
        env:
          - name: API_BASE_URL
            value: "http://ml-api-service:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: ml-dashboard-service
spec:
  selector:
    app: ml-dashboard
  ports:
    - port: 8501
      targetPort: 8501
  type: LoadBalancer
