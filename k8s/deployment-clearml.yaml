apiVersion: apps/v1
kind: Deployment
metadata:
  name: clearml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clearml
  template:
    metadata:
      labels:
        app: clearml
    spec:
      initContainers:
      - name: wait-for-minio
        image: busybox
        command:
          - sh
          - -c
          - |
            until nc -z minio-service 9000; do
              echo "Waiting for MinIO..."
              sleep 2
            done
      containers:
      - name: clearml
        image: allegroai/clearml:latest
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 8008
        env:
          - name: CLEARML_API_HOST
            value: "http://0.0.0.0:8008"
          - name: MINIO_ENDPOINT
            value: "http://minio-service:9000"
          - name: MINIO_ACCESS_KEY
            value: minioadmin
          - name: MINIO_SECRET_KEY
            value: minioadmin
          - name: SERVER_TYPE
            value: "apiserver"
---
apiVersion: v1
kind: Service
metadata:
  name: clearml-service
spec:
  selector:
    app: clearml
  ports:
    - name: http
      port: 8008
      targetPort: 8008
  type: LoadBalancer
