apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoriametrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoriametrics
  template:
    metadata:
      labels:
        app: victoriametrics
    spec:
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:v1.102.1
          args:
            - "--storageDataPath=/victoria-metrics-data"
            - "--retentionPeriod=1"
            - "--selfScrapeInterval=10s"
            - "--promscrape.config=/etc/vm/promscrape.yml"
          ports:
            - containerPort: 8428
          volumeMounts:
            - name: vm-data
              mountPath: /victoria-metrics-data
            - name: vm-scrape-config
              mountPath: /etc/vm
      volumes:
        - name: vm-data
          emptyDir: {}
        - name: vm-scrape-config
          configMap:
            name: vm-promscrape-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vm-promscrape-config
data:
  promscrape.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: "ml-api"
        metrics_path: /metrics
        static_configs:
          - targets: ["ml-api-service:8000"]
---
apiVersion: v1
kind: Service
metadata:
  name: victoriametrics-service
spec:
  selector:
    app: victoriametrics
  ports:
    - name: http
      port: 8428
      targetPort: 8428
  type: ClusterIP
