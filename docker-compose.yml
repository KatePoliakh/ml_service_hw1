version: '3.8'

services:
  ml-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - CLEARML_PROJECT=ML-Service
      - CLEARML_API_HOST=http://clearml:8008
      - MINIO_ENDPOINT=minio:9000
    volumes:
      - ./data:/app/data
      - ./datasets:/app/datasets
      - ./trained_models:/app/trained_models
    depends_on:
      - minio
      - clearml

  ml-grpc:
    build:
      context: .
      dockerfile: docker/Dockerfile.grpc
    ports:
      - "50051:50051"
    environment:
      - CLEARML_PROJECT=ML-Service
      - CLEARML_API_HOST=http://clearml:8008
    volumes:
      - ./data:/app/data
    depends_on:
      - clearml

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://ml-api:8000

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  clearml:
    image: allegroai/clearml:latest
    ports:
      - "8008:8008"
    environment:
      - CLEARML_HOST_IP=localhost
    depends_on:
      - minio

volumes:
  minio_data: